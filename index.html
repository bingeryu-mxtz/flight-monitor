<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>✈ 沪丽机票价格监测</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --sky: #e8f4fd;
  --sky2: #d0e9f8;
  --deep: #0a2540;
  --ink: #1a3a5c;
  --mid: #4a7499;
  --muted: #8aaccb;
  --pale: #c5ddf0;
  --white: #ffffff;
  --green: #00b87a;
  --green-bg: #e6f9f3;
  --red: #e84c3d;
  --red-bg: #fdecea;
  --amber: #f59e0b;
  --amber-bg: #fef3c7;
  --card-shadow: 0 2px 16px rgba(10,37,64,0.10);
  --radius: 16px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: linear-gradient(160deg, #c8e8f8 0%, #e8f4fd 40%, #f0f8ff 100%);
  min-height: 100vh;
  color: var(--deep);
}

/* ── HERO HEADER ── */
.hero {
  background: linear-gradient(135deg, #0a2540 0%, #1a4a7a 60%, #0d6ebd 100%);
  padding: 52px 20px 32px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.hero::after {
  content: '';
  position: absolute;
  bottom: -40px; left: -30px;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: rgba(255,255,255,0.03);
}
.hero-plane {
  font-size: 36px;
  display: block;
  margin-bottom: 10px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0) rotate(-5deg); }
  50% { transform: translateY(-6px) rotate(-5deg); }
}
.hero h1 {
  font-size: 24px;
  font-weight: 900;
  color: #fff;
  letter-spacing: -0.5px;
  line-height: 1.2;
}
.hero h1 span { color: #7dd3fc; }
.hero-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  margin-top: 6px;
}
.hero-dates {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.hero-date-pill {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 12px;
  color: rgba(255,255,255,0.85);
  backdrop-filter: blur(4px);
}
.hero-date-pill strong { color: #fff; }

/* ── UPDATE BAR ── */
.update-bar {
  background: var(--white);
  border-bottom: 1px solid var(--sky2);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  color: var(--muted);
  position: sticky;
  top: 0;
  z-index: 50;
}
.update-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
  margin-right: 6px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.5; transform:scale(0.8); }
}
.admin-btn {
  background: var(--deep);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 12px;
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 500;
  cursor: pointer;
}

/* ── MAIN CONTENT ── */
.content { padding: 16px 16px 100px; }

/* ── BEST PRICE BANNER ── */
.best-banner {
  background: linear-gradient(135deg, #00b87a, #00d4a0);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 16px;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 4px 20px rgba(0,184,122,0.3);
}
.best-banner .label { font-size: 12px; opacity: 0.85; margin-bottom: 2px; }
.best-banner .price { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500; }
.best-banner .source { font-size: 11px; opacity: 0.75; margin-top: 2px; }
.best-banner .icon { font-size: 36px; opacity: 0.7; }

/* ── SECTION TITLE ── */
.section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--mid);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 20px 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--pale);
}

/* ── FLIGHT CARDS ── */
.flight-card {
  background: var(--white);
  border-radius: var(--radius);
  margin-bottom: 12px;
  box-shadow: var(--card-shadow);
  overflow: hidden;
}
.flight-card-header {
  background: linear-gradient(135deg, #0a2540, #1a3a5c);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.flight-route {
  display: flex;
  align-items: center;
  gap: 8px;
}
.flight-time {
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  color: #fff;
}
.flight-arrow {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.flight-arrow span { font-size: 8px; color: rgba(255,255,255,0.3); }
.flight-tag {
  font-size: 10px;
  background: rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.7);
  border-radius: 6px;
  padding: 3px 8px;
}

.platform-rows { padding: 4px 0; }
.platform-row {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--sky);
  gap: 12px;
  transition: background 0.15s;
}
.platform-row:last-child { border-bottom: none; }
.platform-row:active { background: var(--sky); }

.platform-icon {
  width: 34px; height: 34px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}
.icon-ctrip { background: #e8f0ff; color: #1677ff; }
.icon-qunar { background: #e0f4ff; color: #0095e8; }
.icon-fliggy { background: #fff0e6; color: #ff6600; }

.platform-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  flex: 1;
}
.platform-name-sub { font-size: 11px; color: var(--muted); font-weight: 400; margin-top: 1px; }

.price-display {
  text-align: right;
}
.price-num {
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  font-weight: 500;
}
.price-num.best { color: var(--green); }
.price-num.high { color: var(--red); }
.price-num.mid { color: var(--amber); }
.price-num.none { color: var(--pale); font-size: 14px; }

.price-trend {
  font-size: 11px;
  margin-top: 1px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 2px;
}
.trend-up { color: var(--red); }
.trend-dn { color: var(--green); }
.trend-flat { color: var(--muted); }

.best-tag {
  font-size: 9px;
  background: var(--green-bg);
  color: var(--green);
  border-radius: 4px;
  padding: 2px 5px;
  font-weight: 700;
  margin-top: 3px;
  display: inline-block;
}

/* ── NO DATA STATE ── */
.no-data-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 36px 24px;
  text-align: center;
  box-shadow: var(--card-shadow);
  margin-bottom: 16px;
}
.no-data-card .emoji { font-size: 40px; margin-bottom: 12px; }
.no-data-card h3 { font-size: 16px; color: var(--ink); margin-bottom: 6px; }
.no-data-card p { font-size: 13px; color: var(--muted); line-height: 1.6; }

/* ── HISTORY TAB ── */
.history-list { display: flex; flex-direction: column; gap: 10px; }
.history-day {
  background: var(--white);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--card-shadow);
}
.history-day-header {
  background: var(--sky);
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.history-day-min {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: var(--green);
}
.history-row {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--sky);
  font-size: 13px;
  gap: 8px;
}
.history-row:last-child { border-bottom: none; }
.history-flight { color: var(--muted); font-size: 12px; flex: 1; }
.history-prices { display: flex; gap: 10px; }
.hprice {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.hprice-label { font-size: 9px; color: var(--muted); font-family: 'Noto Sans SC', sans-serif; }

/* ── TABS (bottom) ── */
.tab-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--white);
  border-top: 1px solid var(--sky2);
  display: flex;
  padding-bottom: env(safe-area-inset-bottom, 0);
  z-index: 60;
  box-shadow: 0 -4px 20px rgba(10,37,64,0.08);
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 0 8px;
  cursor: pointer;
  border: none;
  background: none;
  font-family: 'Noto Sans SC', sans-serif;
  color: var(--muted);
  font-size: 10px;
  transition: color 0.2s;
  gap: 3px;
}
.tab-item.active { color: var(--deep); }
.tab-icon { font-size: 20px; line-height: 1; }
.tab-item.active .tab-icon { filter: none; }

/* ── MODAL ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,37,64,0.6);
  z-index: 100;
  backdrop-filter: blur(6px);
}
.overlay.open { display: block; }
.sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--white);
  border-radius: 24px 24px 0 0;
  padding: 0 0 env(safe-area-inset-bottom, 20px);
  z-index: 101;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
  max-height: 90vh;
  overflow-y: auto;
}
.sheet.open { transform: translateY(0); }
.sheet-handle {
  width: 36px; height: 4px;
  background: var(--pale);
  border-radius: 2px;
  margin: 12px auto 0;
}
.sheet-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--deep);
  padding: 16px 20px 0;
}
.sheet-body { padding: 16px 20px 24px; }

.form-group { margin-bottom: 14px; }
.form-label {
  font-size: 12px;
  color: var(--mid);
  font-weight: 500;
  margin-bottom: 6px;
  display: block;
}
.form-input, .form-select {
  width: 100%;
  background: var(--sky);
  border: 1.5px solid var(--sky2);
  border-radius: 10px;
  color: var(--deep);
  padding: 11px 14px;
  font-size: 15px;
  font-family: 'Noto Sans SC', sans-serif;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  transition: border-color 0.2s;
}
.form-input:focus, .form-select:focus { border-color: #0d6ebd; }

.price-inputs {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}
.price-input-wrap { position: relative; }
.price-input-wrap label {
  display: block;
  font-size: 11px;
  color: var(--mid);
  margin-bottom: 5px;
  text-align: center;
}
.price-input-wrap input {
  width: 100%;
  background: var(--sky);
  border: 1.5px solid var(--sky2);
  border-radius: 10px;
  color: var(--deep);
  padding: 10px 8px;
  font-size: 16px;
  font-family: 'DM Mono', monospace;
  outline: none;
  text-align: center;
  transition: border-color 0.2s;
}
.price-input-wrap input:focus { border-color: #0d6ebd; background: #fff; }
.price-input-wrap .plat-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-size: 11px;
  color: var(--mid);
  margin-bottom: 5px;
}

.save-btn {
  width: 100%;
  background: linear-gradient(135deg, #0a2540, #1a4a7a);
  color: #fff;
  border: none;
  border-radius: 14px;
  padding: 15px;
  font-size: 16px;
  font-weight: 700;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer;
  margin-top: 8px;
  letter-spacing: 0.5px;
}
.cancel-btn {
  width: 100%;
  background: var(--sky);
  color: var(--mid);
  border: none;
  border-radius: 14px;
  padding: 13px;
  font-size: 14px;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer;
  margin-top: 8px;
}

/* ── SUMMARY PILLS ── */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--white);
  border-radius: 14px;
  padding: 14px 16px;
  box-shadow: var(--card-shadow);
}
.stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.stat-value { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: var(--deep); }
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* page sections */
.page { display: none; }
.page.active { display: block; }

/* chart */
.chart-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--card-shadow);
  margin-bottom: 12px;
}
.chart-card h3 { font-size: 13px; color: var(--mid); margin-bottom: 12px; }
.chart-wrap { height: 180px; position: relative; }
canvas { display: block; }

.chart-legend {
  display: flex;
  gap: 14px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--mid); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

.empty-history {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
  font-size: 13px;
}

/* toast */
.toast {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--deep);
  color: #fff;
  border-radius: 20px;
  padding: 10px 20px;
  font-size: 13px;
  opacity: 0;
  transition: all 0.3s;
  z-index: 200;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <span class="hero-plane">✈️</span>
  <h1>沪丽机票 <span>价格监测</span></h1>
  <p class="hero-sub">携程 · 去哪儿 · 飞猪 · 每日更新</p>
  <div class="hero-dates">
    <div class="hero-date-pill">去程 <strong>5月1日</strong></div>
    <div class="hero-date-pill">回程 <strong>5月5日</strong></div>
    <div class="hero-date-pill">上海 → 丽江</div>
  </div>
</div>

<!-- UPDATE BAR -->
<div class="update-bar">
  <div><span class="update-dot"></span><span id="last-update">暂无数据</span></div>
  <button class="admin-btn" onclick="openSheet()">＋ 录入价格</button>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- TODAY PAGE -->
  <div class="page active" id="page-today">

    <div id="best-banner-wrap"></div>

    <div class="stats-row" id="stats-row">
      <div class="stat-card">
        <div class="stat-label">今日记录</div>
        <div class="stat-value" id="s-count">0</div>
        <div class="stat-sub">条价格</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">监测天数</div>
        <div class="stat-value" id="s-days">0</div>
        <div class="stat-sub">天数据</div>
      </div>
    </div>

    <div class="section-title">三个时段最新价格</div>
    <div id="flights-list"></div>

  </div>

  <!-- HISTORY PAGE -->
  <div class="page" id="page-history">
    <div class="chart-card">
      <h3>📈 各平台最低价走势（往返总价）</h3>
      <div class="chart-wrap">
        <canvas id="trendChart"></canvas>
      </div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#1677ff"></div>携程</div>
        <div class="legend-item"><div class="legend-dot" style="background:#0095e8"></div>去哪儿</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff6600"></div>飞猪</div>
      </div>
    </div>
    <div class="section-title">历史记录</div>
    <div id="history-list"></div>
  </div>

</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-item active" onclick="switchTab('today', this)">
    <span class="tab-icon">🏠</span>今日
  </button>
  <button class="tab-item" onclick="switchTab('history', this)">
    <span class="tab-icon">📊</span>趋势
  </button>
</div>

<!-- MODAL SHEET -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">录入今日机票价格</div>
  <div class="sheet-body">
    <div class="form-group">
      <label class="form-label">记录日期</label>
      <input type="date" class="form-input" id="f-date">
    </div>
    <div class="form-group">
      <label class="form-label">选择航班时段</label>
      <select class="form-select" id="f-flight">
        <option value="0">时段A · 去13:45→17:35 / 回15:20→19:05</option>
        <option value="1">时段B · 去8:35→12:20 / 回12:25→15:55</option>
        <option value="2">时段C · 去14:55→18:40 / 回15:20→19:05</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">各平台往返总价（元）· 无此航班可留空</label>
      <div class="price-inputs">
        <div class="price-input-wrap">
          <div class="plat-icon" style="color:#1677ff">携程</div>
          <input type="number" id="f-ctrip" placeholder="¥" inputmode="numeric">
        </div>
        <div class="price-input-wrap">
          <div class="plat-icon" style="color:#0095e8">去哪儿</div>
          <input type="number" id="f-qunar" placeholder="¥" inputmode="numeric">
        </div>
        <div class="price-input-wrap">
          <div class="plat-icon" style="color:#ff6600">飞猪</div>
          <input type="number" id="f-fliggy" placeholder="¥" inputmode="numeric">
        </div>
      </div>
    </div>
    <button class="save-btn" onclick="saveRecord()">保存记录</button>
    <button class="cancel-btn" onclick="closeSheet()">取消</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
const FLIGHTS = [
  { id:0, label:'时段 A', go:'13:45→17:35', back:'15:20→19:05' },
  { id:1, label:'时段 B', go:'8:35→12:20',  back:'12:25→15:55' },
  { id:2, label:'时段 C', go:'14:55→18:40', back:'15:20→19:05' },
];
const PLATFORMS = [
  { key:'ctrip',  name:'携程',  cls:'icon-ctrip',  color:'#1677ff' },
  { key:'qunar',  name:'去哪儿', cls:'icon-qunar',  color:'#0095e8' },
  { key:'fliggy', name:'飞猪',  cls:'icon-fliggy', color:'#ff6600' },
];
const STORAGE_KEY = 'flight-records';

let records = [];

const todayStr = new Date().toISOString().slice(0,10);
document.getElementById('f-date').value = todayStr;

// ── 云端存储读写 ──
async function loadFromCloud() {
  try {
    const result = await window.storage.get(STORAGE_KEY, true); // shared=true 所有人共享
    records = result ? JSON.parse(result.value) : [];
  } catch {
    records = [];
  }
}

async function save() {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(records), true); // shared=true
  } catch(e) {
    showToast('⚠️ 保存失败，请重试');
    console.error(e);
  }
}

function getLatestDate() {
  const dates = [...new Set(records.map(r=>r.date))].sort();
  return dates.length ? dates[dates.length-1] : null;
}
function getLatestRecs() {
  const d = getLatestDate();
  return d ? records.filter(r=>r.date===d) : [];
}
function getPrevPrice(curDate, fid, pk) {
  const dates = [...new Set(records.map(r=>r.date))].sort();
  const i = dates.indexOf(curDate);
  if (i<=0) return null;
  const r = records.find(r=>r.date===dates[i-1]&&r.flight===fid&&r.platform===pk);
  return r ? r.price : null;
}

function renderToday() {
  const latest = getLatestDate();
  const recs = getLatestRecs();

  // Update bar
  document.getElementById('last-update').textContent =
    latest ? `最近更新：${latest}` : '暂无数据，点击录入价格';

  // Stats
  const days = new Set(records.map(r=>r.date)).size;
  document.getElementById('s-count').textContent = recs.length;
  document.getElementById('s-days').textContent = days;

  // Best banner
  const allPrices = recs.map(r=>r.price).filter(Boolean);
  const minP = allPrices.length ? Math.min(...allPrices) : null;
  const bw = document.getElementById('best-banner-wrap');
  if (minP) {
    const br = recs.find(r=>r.price===minP);
    const bp = PLATFORMS.find(p=>p.key===br.platform);
    const bf = FLIGHTS[br.flight];
    bw.innerHTML = `<div class="best-banner">
      <div>
        <div class="label">🏆 今日最低往返总价</div>
        <div class="price">¥${minP.toLocaleString()}</div>
        <div class="source">${bp.name} · ${bf.label} ${bf.go}</div>
      </div>
      <div class="icon">🎯</div>
    </div>`;
  } else {
    bw.innerHTML = '';
  }

  // Flight cards
  const list = document.getElementById('flights-list');
  if (!latest) {
    list.innerHTML = `<div class="no-data-card">
      <div class="emoji">✈️</div>
      <h3>还没有价格数据</h3>
      <p>点击右上角「录入价格」<br>开始记录今天的机票价格吧</p>
    </div>`;
    return;
  }

  list.innerHTML = '';
  FLIGHTS.forEach(fl => {
    const prices = {};
    recs.forEach(r => { if(r.flight===fl.id) prices[r.platform]=r.price; });
    const vals = Object.values(prices).filter(Boolean);
    const minV = vals.length ? Math.min(...vals) : null;

    const card = document.createElement('div');
    card.className = 'flight-card';
    card.innerHTML = `
      <div class="flight-card-header">
        <div class="flight-route">
          <span class="flight-time">去 ${fl.go}</span>
          <div class="flight-arrow">→<span>往返</span></div>
          <span class="flight-time">回 ${fl.back}</span>
        </div>
        <span class="flight-tag">${fl.label}</span>
      </div>
      <div class="platform-rows" id="prows-${fl.id}"></div>`;
    list.appendChild(card);

    const prows = document.getElementById('prows-'+fl.id);
    PLATFORMS.forEach(p => {
      const price = prices[p.key];
      const isBest = price && price === minV;
      const prev = getPrevPrice(latest, fl.id, p.key);
      let trendHtml = '';
      if (price && prev) {
        const d = price - prev;
        if (d>0) trendHtml = `<span class="price-trend trend-up">▲ +${d}</span>`;
        else if (d<0) trendHtml = `<span class="price-trend trend-dn">▼ ${d}</span>`;
        else trendHtml = `<span class="price-trend trend-flat">— 持平</span>`;
      }

      const row = document.createElement('div');
      row.className = 'platform-row';
      row.innerHTML = `
        <div class="platform-icon ${p.cls}">${p.name[0]}</div>
        <div>
          <div class="platform-name">${p.name}</div>
        </div>
        <div class="price-display">
          ${price
            ? `<div class="price-num ${isBest?'best':vals.length&&price>minV*1.05?'high':'mid'}">¥${price.toLocaleString()}</div>
               ${isBest ? '<div class="best-tag">最低价</div>' : trendHtml}`
            : '<div class="price-num none">未录入</div>'}
        </div>`;
      prows.appendChild(row);
    });
  });
}

let chartInst = null;
function renderHistory() {
  const dates = [...new Set(records.map(r=>r.date))].sort();
  const histList = document.getElementById('history-list');

  if (!dates.length) {
    histList.innerHTML = '<div class="empty-history">📭 暂无历史记录</div>';
    if (chartInst) { chartInst.destroy(); chartInst = null; }
    return;
  }

  // Chart
  const mk = (pk) => dates.map(d => {
    const ps = records.filter(r=>r.date===d&&r.platform===pk).map(r=>r.price);
    return ps.length ? Math.min(...ps) : null;
  });
  const ctx = document.getElementById('trendChart').getContext('2d');
  if (chartInst) chartInst.destroy();
  chartInst = new Chart(ctx, {
    type:'line',
    data:{
      labels: dates,
      datasets:[
        { label:'携程', data:mk('ctrip'), borderColor:'#1677ff', backgroundColor:'#1677ff18', tension:0.35, pointRadius:4, spanGaps:true },
        { label:'去哪儿', data:mk('qunar'), borderColor:'#0095e8', backgroundColor:'#0095e818', tension:0.35, pointRadius:4, spanGaps:true },
        { label:'飞猪', data:mk('fliggy'), borderColor:'#ff6600', backgroundColor:'#ff660018', tension:0.35, pointRadius:4, spanGaps:true },
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        x:{ ticks:{color:'#8aaccb',font:{size:10}}, grid:{color:'#e8f4fd'} },
        y:{ ticks:{color:'#8aaccb',font:{size:10},callback:v=>'¥'+v}, grid:{color:'#e8f4fd'} }
      }
    }
  });

  // History list
  histList.innerHTML = '';
  dates.slice().reverse().forEach(d => {
    const drecs = records.filter(r=>r.date===d);
    const allP = drecs.map(r=>r.price).filter(Boolean);
    const dayMin = allP.length ? Math.min(...allP) : null;

    const block = document.createElement('div');
    block.className = 'history-day';
    block.innerHTML = `<div class="history-day-header">
      <span>${d}</span>
      ${dayMin ? `<span class="history-day-min">最低 ¥${dayMin.toLocaleString()}</span>` : ''}
    </div>`;

    FLIGHTS.forEach(fl => {
      const get = pk => { const r=drecs.find(r=>r.flight===fl.id&&r.platform===pk); return r?r.price:null; };
      const c=get('ctrip'), q=get('qunar'), f=get('fliggy');
      if (!c&&!q&&!f) return;
      const vals=[c,q,f].filter(Boolean);
      const minV=Math.min(...vals);
      const row = document.createElement('div');
      row.className = 'history-row';
      row.innerHTML = `
        <div class="history-flight">${fl.label}<br>${fl.go}</div>
        <div class="history-prices">
          ${[['携程',c,'#1677ff'],['去哪儿',q,'#0095e8'],['飞猪',f,'#ff6600']].map(([n,v,col])=>`
            <div class="hprice">
              <span class="hprice-label" style="color:${col}">${n}</span>
              <span style="color:${v&&v===minV?'var(--green)':'var(--ink)';};font-weight:${v&&v===minV?700:400}">${v?'¥'+v.toLocaleString():'—'}</span>
            </div>`).join('')}
        </div>`;
      block.appendChild(row);
    });
    histList.appendChild(block);
  });
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  if (tab==='history') renderHistory();
}

function openSheet() {
  document.getElementById('f-date').value = todayStr;
  document.getElementById('f-ctrip').value = '';
  document.getElementById('f-qunar').value = '';
  document.getElementById('f-fliggy').value = '';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}

async function saveRecord() {
  const date = document.getElementById('f-date').value;
  const flight = parseInt(document.getElementById('f-flight').value);
  const ctrip = parseFloat(document.getElementById('f-ctrip').value)||0;
  const qunar = parseFloat(document.getElementById('f-qunar').value)||0;
  const fliggy = parseFloat(document.getElementById('f-fliggy').value)||0;
  if (!date) { showToast('请选择日期'); return; }
  if (!ctrip&&!qunar&&!fliggy) { showToast('请至少填写一个价格'); return; }

  const btn = document.querySelector('.save-btn');
  btn.textContent = '保存中…';
  btn.disabled = true;

  records = records.filter(r=>!(r.date===date&&r.flight===flight));
  if (ctrip>0) records.push({date,flight,platform:'ctrip',price:ctrip});
  if (qunar>0) records.push({date,flight,platform:'qunar',price:qunar});
  if (fliggy>0) records.push({date,flight,platform:'fliggy',price:fliggy});

  await save();
  btn.textContent = '保存记录';
  btn.disabled = false;
  closeSheet();
  renderToday();
  showToast('✅ 保存成功！所有人可见');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ── 启动：先加载云端数据，再渲染 ──
async function init() {
  document.getElementById('last-update').textContent = '加载中…';
  await loadFromCloud();
  renderToday();
}

init();
</script>
